<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const locationPath = window.location.pathname + window.location.search + window.location.hash;
      const target = '/?p=' + encodeURIComponent(locationPath);
      window.location.replace(target);
    </script>
  </head>
  <body></body>
</html>
